logsBucket: 'gs://weblogs-pharma'
steps:
- name: 'ubuntu'
  args: ['rm', '-f', 'package-lock.json']
  dir: '.'
- name: 'node:22'
  entrypoint: 'npm'
  args: ['install']
  dir: '.'
- name: 'node:22'
  entrypoint: 'npm'
  args: ['run', 'clean-build']
  dir: '.'
- name: 'gcr.io/cloud-builders/gsutil'
  args: ['rsync', '-r', '-d', './public', 'gs://www.pharmtechsonly.com']